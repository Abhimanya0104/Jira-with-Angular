<aside class="navbarLeft h-screen w-16 bg-white/80 backdrop-blur-xl border-r border-slate-200 shadow-sm">
  <div class="navbarLeft-content flex flex-col items-center gap-6 py-6 h-full">

    <!-- Logo -->
    <div
      class="logoLink flex items-center justify-center rounded-2xl bg-gradient-to-br from-indigo-500 via-sky-500 to-emerald-400 p-2 shadow-lg hover:scale-105 transition cursor-pointer"
      title="FlowBoard Workspace">

      <svg class="w-8 h-8 text-white"
        viewBox="0 0 32 32"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true">
        <defs>
          <linearGradient x1="108.695%" x2="12.439%" y1="-14.936%" y2="45.215%" id="uid11-1">
            <stop stop-color="#DEEBFF" stop-opacity="0.4" offset="0%"></stop>
            <stop stop-color="#DEEBFF" offset="100%"></stop>
          </linearGradient>
          <linearGradient x1="0%" x2="91.029%" y1="118.55%" y2="63.971%" id="uid11-2">
            <stop stop-color="#DEEBFF" stop-opacity="0.4" offset="0%"></stop>
            <stop stop-color="#DEEBFF" offset="100%"></stop>
          </linearGradient>
        </defs>

        <g>
          <path
            d="M15.967 29.362a6.675 6.675 0 0 0 0-9.442l-8.699-8.671-3.957 3.957a1.062 1.062 0 0 0 0 1.5l12.656 12.656z"
            fill="currentColor"></path>

          <path
            d="M28.623 15.206L15.967 2.55l-.039.039a6.675 6.675 0 0 0 .028 9.41l8.706 8.667 3.96-3.96a1.062 1.062 0 0 0 0-1.5z"
            fill="currentColor"></path>
        </g>
      </svg>
    </div>

    <!-- Navigation icons -->
    @for (item of items; track item) {
      <div class="group">

        <div
          (click)="item.handler()"
          nz-tooltip
          [nzTooltipTitle]="item.tooltip"
          nzTooltipPlacement="right"
          class="sidebarIcon flex items-center justify-center w-10 h-10 rounded-xl transition cursor-pointer">

          <i
            nz-icon
            [nzType]="item.icon"
            nzTheme="outline"
            class="text-lg text-slate-500 group-hover:text-indigo-600 transition">
          </i>

        </div>
      </div>
    }

    <div class="flex-auto"></div>

    <!-- User -->
    @if (authQuery.user$ | async; as user) {
      <div class="group">

        <div
          nz-tooltip
          [nzTooltipTitle]="user.name"
          nzTooltipPlacement="right"
          class="sidebarIcon flex items-center justify-center w-10 h-10 rounded-xl transition">

          <j-avatar
            class="flex"
            [avatarUrl]="user.avatarUrl"
            [size]="26">
          </j-avatar>

        </div>

      </div>
    }

    <!-- About -->
    <div class="group">
      <a
        nz-popover
        nzPopoverPlacement="rightBottom"
        [nzPopoverContent]="aboutPopoverTmpl"
        nzPopoverTrigger="click">

        <div
          nz-tooltip
          nzTooltipTitle="About FlowBoard"
          nzTooltipPlacement="right"
          class="sidebarIcon flex items-center justify-center w-10 h-10 rounded-xl transition cursor-pointer">

          <i
            nz-icon
            nzType="question-circle"
            nzTheme="outline"
            class="text-lg text-slate-500 group-hover:text-indigo-600 transition">
          </i>

        </div>
      </a>
    </div>

  </div>
</aside>

<ng-template #aboutPopoverTmpl>
  <div class="about-popover max-w-xs text-sm">
    <p class="font-semibold mb-1">FlowBoard</p>
    <p class="mb-2">
      A personal task and project management workspace designed for focused execution and clear priorities.
    </p>
    <p>
      Track work visually using a lightweight Kanban board and keep projects moving forward.
    </p>
  </div>
</ng-template>
